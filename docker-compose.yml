services:
  api:
    image: ${REGISTRY}/betting-copilot:${IMAGE_TAG:-latest}
    container_name: betting-copilot-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/New_York
    volumes:
      # Mount model pickles so you can hot-swap them without rebuilding the image.
      # scp new .pkl to Droplet → docker compose up -d picks it up immediately.
      - ./models/versions:/app/models/versions:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
